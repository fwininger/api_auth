name: main
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  rspec:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        ruby-version:
          - 3.2
          - 3.3
          - 3.4
        gemfile:
          - rails_7.gemfile
          - rails_8.gemfile
          - rails_8.1.gemfile
    steps:
      - name: Install packages required for `curb` gem
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4 libcurl3-gnutls libcurl4-openssl-dev

      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Install required gems
        run: BUNDLE_GEMFILE=gemfiles/${{ matrix.gemfile }} bundle install

      - name: Run rspec tests
        run: BUNDLE_GEMFILE=gemfiles/${{ matrix.gemfile }} bundle exec rspec

  rubocop:
    runs-on: ubuntu-latest
    steps:
      - name: Install packages required for `curb` gem
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4 libcurl3-gnutls libcurl4-openssl-dev

      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true

      - name: Install required gems
        run: bundle install

      - name: Run rubocop
        run: bundle exec rubocop
